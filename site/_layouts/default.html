<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ site.description | strip_html | strip_newlines | truncate: 160 }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital,wght@0,300;0,400;1,300;1,400&family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <span class="wordmark">Splash</span>
      <div class="header-right">
        <a class="header-icon-link" href="https://github.com/gosplash/splash" aria-label="Splash on GitHub">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 98 96" width="18" height="18" aria-hidden="true" fill="currentColor">
            <path d="M48.854 0C21.839 0 0 21.839 0 48.854c0 21.613 14.014 39.941 33.425 46.408 2.444.452 3.338-1.062 3.338-2.357 0-1.164-.043-5.01-.068-9.086-13.598 2.956-16.47-5.773-16.47-5.773-2.223-5.647-5.426-7.151-5.426-7.151-4.437-3.034.334-2.972.334-2.972 4.909.345 7.494 5.04 7.494 5.04 4.363 7.48 11.447 5.319 14.24 4.067.439-3.16 1.707-5.321 3.107-6.544-10.855-1.235-22.271-5.428-22.271-24.163 0-5.338 1.909-9.702 5.04-13.123-.507-1.234-2.184-6.209.476-12.944 0 0 4.11-1.315 13.469 5.013 3.906-1.086 8.094-1.629 12.255-1.648 4.161.019 8.35.562 12.263 1.648 9.351-6.328 13.453-5.013 13.453-5.013 2.668 6.735.991 11.71.484 12.944 3.139 3.421 5.031 7.785 5.031 13.123 0 18.781-11.434 22.914-22.316 24.125 1.756 1.52 3.322 4.496 3.322 9.061 0 6.544-.06 11.817-.06 13.425 0 1.304.878 2.833 3.355 2.351C83.986 88.789 98 70.462 98 48.854 98 21.839 76.161 0 48.854 0z"/>
          </svg>
        </a>
        <a class="translate-link" href="https://gosplash-dev.translate.goog/?_x_tr_sl=en&_x_tr_tl=zh-TW&_x_tr_hl=en&_x_tr_pto=wapp">中文</a>
        <span class="site-domain">gosplash.dev</span>
      </div>
    </div>
  </header>

  <main class="site-main">
    <article class="content">
      {{ content }}
    </article>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <span>Splash v0.1</span>
      <span>gosplash.dev</span>
    </div>
  </footer>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-bash.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-go.min.js"></script>
  <script src="{{ '/assets/js/prism-splash.js' | relative_url }}"></script>
  <script src="{{ '/assets/js/heading-anchors.js' | relative_url }}"></script>
</body>
</html>
